name: Infra Domain Sync

# Phase 10 of the domain-infra-sync build (specs/2026-04-24-domain-infra-sync-build-plan.md).
# workflow_dispatch + weekly cron. Cron added 2026-04-26 after the
# 2026-04-26 manual `full` run successfully refreshed 8 of 22 workspaces
# whose infra_accounts were materially stale (outlook-1 was 59x off);
# dispatch-only cadence proved too rare to keep accuracy.

on:
  schedule:
    # Sunday 04:00 UTC — runs 75 min before infra-account-tag-sync.yml at
    # 5:15 UTC. Full inventory + 7d incremental metrics + aggregate. Deliberately
    # ahead of the tag sync so the registry rebuild downstream sees fresh
    # accounts.
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'inventory'
        type: choice
        options:
          - phase0
          - inventory
          - metrics-incremental
          - metrics-backfill
          - aggregate-only
          - full
      workspace:
        description: 'Single workspace slug (leave blank for all in-scope)'
        required: false
        default: ''
      start_date:
        description: 'Start date YYYY-MM-DD (metrics-backfill only)'
        required: false
        default: ''
      end_date:
        description: 'End date YYYY-MM-DD (metrics-backfill only)'
        required: false
        default: ''
      days:
        description: 'Trailing days for metrics-incremental (default 7)'
        required: false
        default: '7'

jobs:
  sync:
    name: Infra domain sync
    runs-on: ubuntu-latest
    # Inventory pagination is heavy: outlook-3 alone has ~164k accounts and
    # takes ~6.5 min (1646 paginated /accounts calls). Full 22-workspace
    # inventory takes ~2.5 hr. Keep this generous; per-workspace dispatch is
    # the recommended production pattern.
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI args
        id: args
        env:
          # On schedule, github.event.inputs is empty — fall back to safe
          # defaults: mode=full, days=7, no workspace filter.
          MODE: ${{ github.event.inputs.mode || 'full' }}
          WORKSPACE: ${{ github.event.inputs.workspace }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          DAYS: ${{ github.event.inputs.days || '7' }}
        run: |
          ARGS="--mode $MODE"
          if [ -n "$WORKSPACE" ]; then
            ARGS="$ARGS --workspace $WORKSPACE"
          fi
          if [ "$MODE" = "metrics-backfill" ]; then
            if [ -z "$START_DATE" ] || [ -z "$END_DATE" ]; then
              echo "::error::metrics-backfill requires both start_date and end_date"
              exit 1
            fi
            ARGS="$ARGS --start $START_DATE --end $END_DATE"
          fi
          if [ "$MODE" = "metrics-incremental" ] || [ "$MODE" = "full" ]; then
            ARGS="$ARGS --days ${DAYS:-7}"
          fi
          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "Resolved CLI: npx tsx scripts/sync-infra-domains.ts $ARGS"

      - name: Run infra sync
        run: npx tsx scripts/sync-infra-domains.ts ${{ steps.args.outputs.args }}
        env:
          INSTANTLY_API_KEYS: ${{ secrets.INSTANTLY_API_KEYS }}
          PIPELINE_SUPABASE_URL: ${{ secrets.PIPELINE_SUPABASE_URL }}
          PIPELINE_SUPABASE_KEY: ${{ secrets.PIPELINE_SUPABASE_KEY }}
