name: Meetings Booked Slack Sync

on:
  schedule:
    - cron: '0 */4 * * *'    # every 4 hours
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx tools/test-slack-sync.ts
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_COOKIE: ${{ secrets.SLACK_COOKIE }}
          PIPELINE_SUPABASE_URL: ${{ secrets.PIPELINE_SUPABASE_URL }}
          PIPELINE_SUPABASE_KEY: ${{ secrets.PIPELINE_SUPABASE_KEY }}
