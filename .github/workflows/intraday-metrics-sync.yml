name: Intraday Metrics Sync

# Runs every hour at :30 to keep campaign_daily_metrics current during the
# sending day. Fetches today's date only, active campaigns only — much faster
# than the 7-day daily_metrics run. Offset from full-sync (:00) to avoid
# simultaneous API pressure.

on:
  schedule:
    - cron: '30 * * * *'   # every hour at :30 UTC
  workflow_dispatch:
    inputs:
      workspaces:
        description: 'Comma-separated workspace slugs (leave blank for all)'
        required: false
        default: ''

jobs:
  sync:
    name: Intraday → campaign_daily_metrics
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run today_metrics sync
        run: npx tsx src/runner.ts
        env:
          INSTANTLY_API_KEYS: ${{ secrets.INSTANTLY_API_KEYS }}
          SUPABASE_URL: ${{ secrets.PIPELINE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.PIPELINE_SUPABASE_KEY }}
          WORKSPACE_FILTER: ${{ github.event.inputs.workspaces || '' }}
          RUN_TYPE: today_metrics
