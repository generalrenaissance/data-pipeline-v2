name: Infra Sheet Registry Sync

# Daily refresh of the infra sheet registry directly from the live
# Renaissance Google Sheet via service account (no /tmp/renaissance_sheet
# dump dependency). Pulls 6 tabs (Funding / Other / Archived (ERC) /
# Archived (Other) / Brands allocation / Cancelled), parses, and upserts
# into infra_sheet_registry / infra_brand_registry / infra_cancelled_registry.
#
# Runs at 04:00 UTC, ~75 minutes before infra-account-tag-sync.yml so
# the downstream domain-registry rebuild sees the freshest sheet truth.
#
# Mirrors infra-account-tag-sync.yml's Slack notification pattern
# (success + failure, if: always()) so a hung / killed run is observable.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Parse only; do not write to Supabase'
        required: false
        default: 'false'
        type: string

jobs:
  sync:
    name: Sync infra sheet registry from live Google Sheet
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync infra sheet registry
        id: sync
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/sync-infra-sheet-registry.ts --dry-run
          else
            npm run sync:infra-sheet-registry
          fi
        env:
          SHEET_SOURCE: api
          RENAISSANCE_SHEET_ID: ${{ secrets.RENAISSANCE_SHEET_ID }}
          GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON }}
          PIPELINE_SUPABASE_URL: ${{ secrets.PIPELINE_SUPABASE_URL }}
          PIPELINE_SUPABASE_KEY: ${{ secrets.PIPELINE_SUPABASE_KEY }}

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SUPERVISOR_SLACK_WEBHOOK_URL }}
          SYNC_OUTCOME: ${{ steps.sync.outcome }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SUPERVISOR_SLACK_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi
          if [ "$SYNC_OUTCOME" = "success" ]; then
            STATUS=":white_check_mark: SUCCESS"
          else
            STATUS=":skull: FAILED"
          fi
          MODE="cron"
          if [ -n "$DRY_RUN" ]; then MODE="dispatch (dry_run=$DRY_RUN)"; fi
          PAYLOAD=$(cat <<EOF
          {
            "text": "<@U0AM2CQHW9E> *Infra Sheet Registry Sync*: $STATUS\n• mode: $MODE\n• sync: $SYNC_OUTCOME\n• <$RUN_URL|workflow run>"
          }
          EOF
          )
          curl -s -X POST -H 'Content-Type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Fail workflow if sync step failed
        if: steps.sync.outcome == 'failure'
        run: exit 1
